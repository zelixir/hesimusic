name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        type: string
      skip_tests:
        description: Skip unit tests before building the release
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.0.1

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmake;3.22.1" \
            "ndk;27.2.12479018"

      - name: Run unit tests
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_tests }}
        run: |
          chmod +x gradlew
          ./gradlew test \
            -PreleaseVersionName="${{ steps.version.outputs.value }}" \
            -PreleaseVersionCode="${{ github.run_number }}"

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PreleaseVersionName="${{ steps.version.outputs.value }}" \
            -PreleaseVersionCode="${{ github.run_number }}"

      - name: Prepare release asset
        run: |
          mkdir -p dist
          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          cp "$apk_path" "dist/hesimusic-v${{ steps.version.outputs.value }}.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          files: dist/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
